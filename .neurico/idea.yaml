idea:
  title: 'Probing the Limits: Adversarial and OOD Robustness of Neural Thicket Ensembles'
  domain: machine_learning
  hypothesis: 'While neural thicket ensembles improve robustness compared to single
    models, their vulnerability to adversarial and out-of-distribution (OOD) inputs
    depends on the diversity and independence of the sampled experts. Explicitly encouraging
    diversity (e.g., via orthogonal perturbations or adversarially selected directions)
    will further enhance ensemble resilience.

    '
  background:
    description: "If we build ensembles from random perturbations around a pretrained\
      \ model, do they stand up to tricky attacks or weird new data? We\u2019ll stress-test\
      \ these ensembles and seek ways to make them even more robust.\n"
    papers:
    - description: '"Neural Thickets: Diverse Task Experts Are Dense Around Pretrained
        Weights." Gan, Y., & Isola, P. (2026).'
    - description: '"Ensemble-in-One: Ensemble Learning within Random Gated Networks
        for Enhanced Adversarial Robustness." Cai, Y., Ning, X., Yang, H., & Wang,
        Y. (2023). AAAI Conference on Artificial Intelligence.'
